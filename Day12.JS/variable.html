<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        //variable -It is a box in which we store values
        //syntax - VariableType/Keyword variable values

        //Variable will only store one or single value at a time

        //1. var keyword - JS creates a variable

        var username="Rama" //"text"-indirectly
        var height=5.9

        console.log(username) // number - directly
        console.log("Height:" , height)

        var country="India"

        var country="Bharat"

        console.log(country)
        //Disadvantage of var is it allows to use same variablename

        //2.let keyword - You cannot use same variablname again

        let email="abc@gamil.com"
        console.log(email)

        let fruit="Mango"
        console.log(fruit)
        fruit="Apple"
        console.log(fruit)

        // You can still manipulate the "let" keyword

        //3.constant keyword - fixed, cannot be modified

        const app="FaceBook"
        // app="Amazon"
        console.log(app)
    </script>
    
</body>
</html>
