<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //arthmetic operators = +, - , * , / ,%

        var a=10
        var b=7

        console.log(a+b)//17
        console.log(a-b)//3
        console.log(a/b)//1.4..
        console.log(a%b)//3 if left number is < right number then we write left number
        console.log(a*b)//70

        //even number % gives 0 or even remainder
        //odd number % gives 1 or odd remainder

        //Assignment operator - Help us to assign value by using equal to -=

        var x=10
        //assign and operation
        console.log(x+=2)
    </script>
</body>
</html>
