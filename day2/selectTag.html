<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <select>
        <option selected disabled>Country</option>
        <option>India</option>
        <option>Japan</option>
        <option>Russia</option>
        <option disabled>Swedan</option>
        <option>France</option>
        <option label="USA">United States of America</option>
    </select>

    <select required>
        <option>Delhi</option>
        <option>Mumbai</option>
    </select>

    <select disabled>
        <option>Delhi</option>
        <option>Mumbai</option>
    </select>

    <select multiple>
        <option>Delhi</option>
        <option>Mumbai</option>
        <option>Hyderabad</option>
        <option>Gujarat</option>
    </select>

    <select size="3">
        <option>Delhi</option>
        <option>Mumbai</option>
        <option>Mysore</option>
        <option>Hyderabad</option>
    </select>

    
    
</body>
</html>
