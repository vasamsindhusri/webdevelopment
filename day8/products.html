<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height:100vh;
            font-family: Arial, Helvetica, sans-serif;

            display:flex;
            justify-content: center;
            gap:20px;
            align-items: center;
            flex-wrap:wrap;    
        }

        .product{
            border:1px solid black;
            width:250px;
            padding:12px;
            border-radius: 12px;
            margin-bottom: 15px;

            text-align: center;
            /* box-shadow: Xaxis Yaxis Spread-Radius pink; */
            box-shadow:4px 4px 8px blue;
        }

        .product:hover{
            background-color:#ff0000;
            transition:2s;
            transform: scale(1.03);
            color:white;
            transform: rotateY(200deg);

        }
        .product h2{
              border-bottom: 1px solid black;
        }

        .product img{
            width:100%;
            height:160px;
            object-fit:cover;
            border-radius: 12px;
        }

        .product button{
            background-color: orange;
            border:none;
            border-radius: 12px;
            width:90%;
        }
    </style>
</head>
<body>
    <div class="product">
        <img src="https://images.pexels.com/photos/5269752/pexels-photo-5269752.jpeg">
        <h1>Headphones</h1>
        <p>9999₹</p>
        <button>Buy Now</button>
    </div>

    <div class="product">
        <img src="https://images.pexels.com/photos/13886741/pexels-photo-13886741.jpeg">
        <h1>Iphone</h1>
        <p>99999₹</p>
        <button>Buy Now</button>
    </div>

    <div class="product">
        <img src="https://images.pexels.com/photos/12052484/pexels-photo-12052484.jpeg">
        <h1>Tablet</h1>
        <p>99999₹</p>
        <button>Buy Now</button>
    </div>


</body>
</html>
