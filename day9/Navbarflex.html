<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing: border-box;
        }

        nav{
            background: #1f2937;
            padding:20px 50px;
            display:flex;
            justify-content: space-between;
            align-items: center;
        }

        h2{
            color:white;
        }

        .menu{
            display: flex;
            gap:15px;
        }
         
        a{
            color: white;
            text-decoration: none;
            font-size: 15px;
        }

        a:hover{
            background-color: yellowgreen;
            transition: 0.4s;
        }
    </style>
</head>
<body>
    <nav>
        <h2>
            Code Academy
        </h2>
        
        <div class="menu">
            <a href="#menu">Home</a>
            <a href="#menu">Courses</a>
            <a href="#menu">Project</a>
            <a href="#menu">Login</a>
        </div>
        
    </nav>
</body>
</html>
