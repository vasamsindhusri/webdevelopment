    form{

    label{
        font-weight: bold;

        margin-bottom: 5px;

    input,
    textarea{
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border: 2px solid #161816;
        border-radius: 6px;
        box-sizing: border-box;
        font-size: 14px;
    }

    input:focus,
    textarea:focus{
        border-color: #636465;
        outline: none;
        box-shadow: 0 0 5px rgba(107, 108, 109, 0.5);

    .buttons{
        display: flex;
        justify-content: space-between;

    }

    button{
        width: 48%;
        padding: 10px;
        border: none;
        border-radius: 6px;

        cursor: pointer;
    }

    button[type="submit"]{

    }

    button[type="submit"]:hover{

    }

    button[type="reset"]{
